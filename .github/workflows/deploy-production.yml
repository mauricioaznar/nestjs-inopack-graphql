name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/mauricioaznar/nestjs-inopack-graphql

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.PROD_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to production
        env:
          IMAGE: ghcr.io/mauricioaznar/nestjs-inopack-graphql
          SHA: ${{ github.sha }}
          HOST: ${{ secrets.PROD_SSH_HOST }}
          USER: ${{ secrets.PROD_SSH_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
        run: |
          ssh $USER@$HOST bash << EOF
            set -e

            # Backup DB before anything else — if this fails the deploy aborts.
            # --single-transaction = consistent snapshot of live InnoDB without
            # locking; include routines/triggers/events so the dump is restorable.
            BACKUP_FILE="/root/backups/inopack_\$(date +%Y%m%d_%H%M%S).sql"
            mysqldump --single-transaction --quick --routines --triggers --events \
              -u root -p"$DB_PASSWORD" inopack > \$BACKUP_FILE
            echo "Backup saved to \$BACKUP_FILE"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u mauricioaznar --password-stdin

            # Pull while the old container is still serving — a pull failure aborts
            # here (set -e) with the app untouched.
            docker pull $IMAGE:$SHA

            # Quiet window: stop the app so migrations run against a DB nothing is
            # writing to. Keep the container (no rm yet) so we can restart it if the
            # migration fails.
            docker stop inopack-graphql 2>/dev/null || true

            # Migrate. On failure, bring the OLD container back up and abort — a bad
            # migration is then no worse than a no-op (old version serving again).
            if ! docker run --rm \
                 --network host \
                 --env-file /root/inopack.env \
                 $IMAGE:$SHA \
                 node dist/db/runner.js; then
              echo "Migration failed — restarting previous container"
              docker start inopack-graphql 2>/dev/null || true
              exit 1
            fi

            # Migration OK — swap to the new image.
            docker rm inopack-graphql 2>/dev/null || true
            docker run -d \
              --name inopack-graphql \
              --restart unless-stopped \
              --network host \
              --env-file /root/inopack.env \
              $IMAGE:$SHA

            # Prune old images, and keep only the 10 newest DB backups so
            # /root/backups can't fill the disk and break future deploys.
            docker image prune -f
            ls -t /root/backups/inopack_*.sql 2>/dev/null | tail -n +11 | xargs -r rm --
          EOF
