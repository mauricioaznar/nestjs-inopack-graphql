name: Deploy to Staging

on:
  push:
    branches: [stage]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/mauricioaznar/nestjs-inopack-graphql

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.STAGING_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to staging
        env:
          IMAGE: ghcr.io/mauricioaznar/nestjs-inopack-graphql
          SHA: ${{ github.sha }}
          HOST: ${{ secrets.STAGING_SSH_HOST }}
          USER: ${{ secrets.STAGING_SSH_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh $USER@$HOST bash << EOF
            set -e

            echo "$GHCR_TOKEN" | docker login ghcr.io -u mauricioaznar --password-stdin

            docker pull $IMAGE:$SHA

            # Reset DB from latest dump then run migrations.
            # /root/inopack/inopack.sql is rsynced from production as a gzipped mysqldump
            # (see docs/plans/ongoing/backup-replication.md). Stream it through gunzip so
            # mysql gets plain SQL — piping the gzip header in directly produces
            # "ASCII '\0' appeared in the statement" because of the NUL in the magic bytes.
            # Quiet window: stop the app before the DB reset + migrate so nothing
            # is writing while we mutate the schema. Keep the container (no rm yet)
            # so we can restart it if the migration fails. Mirrors production so the
            # stop/migrate/rollback/swap control flow is validated here first.
            docker stop inopack-graphql 2>/dev/null || true

            mysql -u root -proot -e "DROP DATABASE inopack; CREATE DATABASE inopack;"
            gunzip -c /root/inopack/inopack.sql | mysql -u root -proot inopack

            # Migrate. On failure, bring the previous container back up and abort.
            if ! docker run --rm \
                 --network host \
                 --env-file /root/inopack/.env \
                 $IMAGE:$SHA \
                 node dist/db/runner.js; then
              echo "Migration failed — restarting previous container"
              docker start inopack-graphql 2>/dev/null || true
              exit 1
            fi

            # Migration OK — swap to the new image.
            docker rm inopack-graphql 2>/dev/null || true
            docker run -d \
              --name inopack-graphql \
              --restart unless-stopped \
              --network host \
              --env-file /root/inopack/.env \
              $IMAGE:$SHA

            # Prune old images
            docker image prune -f
          EOF
